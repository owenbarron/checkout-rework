<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>USEFULL Checkout Kiosk</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#008C95">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="USEFULL">
    <link rel="apple-touch-icon" href="USEFULL-Icon-Registered_Color.svg">
    <link rel="icon" type="image/svg+xml" href="USEFULL-Icon-Registered_Color.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                        body: ['"DM Sans"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { height: 100%; width: 100%; overflow: hidden; }
        body { font-family: 'DM Sans', sans-serif; }

        /* Reticle corner brackets */
        .reticle-corner {
            position: absolute;
            width: 48px;
            height: 48px;
        }
        .reticle-corner::before,
        .reticle-corner::after {
            content: '';
            position: absolute;
            background: rgba(0, 140, 149, 0.85);
            border-radius: 2px;
        }
        .reticle-corner--tl::before { top: 0; left: 0; width: 48px; height: 5px; }
        .reticle-corner--tl::after  { top: 0; left: 0; width: 5px; height: 48px; }
        .reticle-corner--tr::before { top: 0; right: 0; width: 48px; height: 5px; }
        .reticle-corner--tr::after  { top: 0; right: 0; width: 5px; height: 48px; }
        .reticle-corner--bl::before { bottom: 0; left: 0; width: 48px; height: 5px; }
        .reticle-corner--bl::after  { bottom: 0; left: 0; width: 5px; height: 48px; }
        .reticle-corner--br::before { bottom: 0; right: 0; width: 48px; height: 5px; }
        .reticle-corner--br::after  { bottom: 0; right: 0; width: 5px; height: 48px; }

        /* Scan line animation */
        @keyframes scanLine {
            0%, 100% { top: 15%; }
            50% { top: 80%; }
        }
        .scan-line {
            animation: scanLine 2.8s ease-in-out infinite;
        }

        /* Slide up for toasts */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleUp {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(40px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes countPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
        @keyframes checkDraw {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 140, 149, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(0, 140, 149, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ============================================================
        // CONSTANTS — extract these for RN handoff
        // ============================================================
        const COLORS = {
            teal:       '#008C95',
            tealDark:   '#006B72',
            tealLight:  '#E0F7F8',
            gold:       '#D5992C',
            darkGray:   '#58595b',
            white:      '#FFFFFF',
            offWhite:   '#F8FAFB',
            red:        '#DC2626',
            amber:      '#F59E0B',
        };

        const TIMING = {
            timeoutDuration:    30,   // seconds
            errorDisplayMs:     4000,
            successDisplayMs:   4000,
            scanFeedbackMs:     1500,
        };

        const LAYOUT = {
            headerHeight:   96,
            footerHeight:    68,
            timeoutBarHeight: 8,
        };


        // ============================================================
        // ICONS (inline SVG components)
        // ============================================================
        const IconCheck = ({ className, style }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
                <path d="M20 6 9 17l-5-5"/>
            </svg>
        );
        const IconX = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
            </svg>
        );
        const IconAlert = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
        );
        const IconSettings = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        );


        // ============================================================
        // USEFULL LOGO (knockout white SVG inline)
        // ============================================================
        const UsefullLogo = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 144" className={className}>
                <g>
                    <path fill="#fff" d="M88.85,83.9c0,11.31-7.44,18.34-19.4,18.34s-19.4-7.03-19.4-18.34V46.13h-6.49v37.92c0,14.94,10.16,24.6,25.89,24.6s25.89-9.66,25.89-24.6V46.13h-6.49v37.77Z"/>
                    <path fill="#fff" d="M141.57,73.67l-.29-.09c-10.6-3.34-17.04-5.84-17.04-12.37,0-6.19,5.89-10.04,15.37-10.04,10.06,0,16.82,4.22,16.82,10.5v1.38h6.41v-1.68c0-9.49-9.77-16.38-23.23-16.38s-22.09,6.64-22.09,16.53c0,11.6,12.64,15.48,21.87,18.31,10.7,3.24,17.72,5.87,17.72,12.6,0,6.19-6.12,10.04-15.98,10.04-10.56,0-17.65-4.22-17.65-10.5v-1.3h-6.41v1.61c0,9.64,9.9,16.38,24.07,16.38s22.77-6.46,22.77-16.45c0-11.74-12.91-15.66-22.34-18.53Z"/>
                    <polygon fill="#fff" points="186.25 107.51 229.05 107.51 229.05 101.1 192.74 101.1 192.74 80.48 223.65 80.48 223.65 74.22 192.74 74.22 192.74 52.54 229.05 52.54 229.05 46.13 186.25 46.13 186.25 107.51"/>
                    <polygon fill="#fff" points="252.78 106.51 267.93 106.51 267.93 86.18 292.21 86.18 292.21 72.4 267.93 72.4 267.93 61.9 296.86 61.9 296.86 47.13 252.78 47.13 252.78 106.51"/>
                    <polygon fill="#fff" points="438.58 47.13 423.43 47.13 423.43 106.51 467.05 106.51 467.05 91.82 438.58 91.82 438.58 47.13"/>
                    <polygon fill="#fff" points="503.97 91.82 503.97 47.13 488.82 47.13 488.82 106.51 532.45 106.51 532.45 91.82 503.97 91.82"/>
                    <path fill="#D5992C" d="M332.04,67.58h0c.02,15.56,12.64,28.17,28.2,28.17s28.18-12.61,28.2-28.17h0v-3.27h-56.4v3.27Z"/>
                    <path fill="#fff" d="M395.47,46.41v10.86h0v10.32c-.02,19.41-15.83,35.2-35.24,35.2s-35.22-15.79-35.24-35.21v-31.58h0v-6.5s7.53,7.53,7.53,7.53l4.28-4.28-14.7-14.7-14.7,14.7,4.28,4.28,7.44-7.44v37.99c.03,22.65,18.47,41.07,41.11,41.07s41.08-18.42,41.11-41.06v-21.19h-5.87Z"/>
                </g>
                <path fill="#fff" d="M538.09,42.25c4.09,0,7.41,3.32,7.41,7.41s-3.32,7.41-7.41,7.41-7.41-3.32-7.41-7.41,3.32-7.41,7.41-7.41Zm0,13.84c3.57,0,6.43-2.87,6.43-6.43s-2.87-6.43-6.43-6.43-6.43,2.87-6.43,6.43,2.87,6.43,6.43,6.43Zm2.2-3.02l-1.46-2.53h-2.47v2.53h-.92v-7.17h3.29c1.55,0,2.44,1.07,2.44,2.32,0,.95-.52,1.8-1.43,2.13l1.59,2.71h-1.04Zm-3.93-6.25v2.8h2.35c.98,0,1.55-.7,1.55-1.4s-.58-1.4-1.55-1.4h-2.35Z"/>
            </svg>
        );


        // ============================================================
        // HEADER (includes step indicator)
        // ============================================================
        const Header = ({ currentStep }) => {
            const steps = [
                { num: 1, label: 'SCAN ITEMS' },
                { num: 2, label: 'SCAN USER' },
            ];
            return (
                <div
                    className="w-full flex items-center justify-between px-8 shrink-0"
                    style={{ height: LAYOUT.headerHeight, backgroundColor: COLORS.teal }}
                >
                    <UsefullLogo className="h-14 w-auto" />

                    {/* Step indicator — center */}
                    <div className="flex items-center gap-4">
                        {steps.map((step, i) => {
                            const isActive = step.num <= currentStep;
                            const isCurrent = step.num === currentStep;
                            return (
                                <React.Fragment key={step.num}>
                                    {i > 0 && (
                                        <div className="w-10 h-[2px] rounded-full" style={{ backgroundColor: currentStep >= 2 ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.2)' }} />
                                    )}
                                    <div className="flex items-center gap-2.5">
                                        <div
                                            className="w-9 h-9 rounded-full flex items-center justify-center text-base font-bold font-display"
                                            style={{
                                                backgroundColor: isActive ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.08)',
                                                color: isActive ? '#fff' : 'rgba(255,255,255,0.35)',
                                                border: isActive ? '2px solid rgba(255,255,255,0.55)' : '2px solid rgba(255,255,255,0.15)',
                                                boxShadow: isCurrent ? '0 0 0 3px rgba(255,255,255,0.25)' : 'none',
                                            }}
                                        >
                                            {step.num}
                                        </div>
                                        <span
                                            className="text-sm font-bold font-display tracking-widest uppercase"
                                            style={{ color: isActive ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.3)' }}
                                        >
                                            {step.label}
                                        </span>
                                    </div>
                                </React.Fragment>
                            );
                        })}
                    </div>
                </div>
            );
        };


        // ============================================================
        // STEP STRIP
        // ============================================================
        const StepStrip = ({ currentStep }) => {
            const steps = [
                { num: 1, label: 'SCAN ITEMS' },
                { num: 2, label: 'SCAN USER' },
            ];

            return (
                <div
                    className="w-full flex items-center justify-center shrink-0 border-b border-gray-100"
                    style={{ height: LAYOUT.stepStripHeight, backgroundColor: COLORS.offWhite }}
                >
                    <div className="flex items-center gap-5">
                        {steps.map((step, i) => {
                            const isActive = step.num <= currentStep;
                            const isCurrent = step.num === currentStep;
                            return (
                                <React.Fragment key={step.num}>
                                    {i > 0 && (
                                        <div className="w-10 h-[2px] rounded-full" style={{ backgroundColor: currentStep >= 2 ? COLORS.teal : '#D1D5DB' }} />
                                    )}
                                    <div className="flex items-center gap-2">
                                        <div
                                            className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold font-display transition-all duration-300 ${isCurrent ? 'ring-2 ring-offset-1' : ''}`}
                                            style={{
                                                backgroundColor: isActive ? COLORS.teal : '#E5E7EB',
                                                color: isActive ? COLORS.white : '#9CA3AF',
                                                ringColor: isCurrent ? COLORS.teal : 'transparent',
                                            }}
                                        >
                                            {step.num}
                                        </div>
                                        <span
                                            className="text-xs font-bold font-display tracking-wide transition-all duration-300"
                                            style={{ color: isActive ? COLORS.teal : '#9CA3AF' }}
                                        >
                                            {step.label}
                                        </span>
                                    </div>
                                </React.Fragment>
                            );
                        })}
                    </div>
                </div>
            );
        };


        // ============================================================
        // TIMEOUT BAR
        // ============================================================
        const TimeoutBar = ({ timeLeft, isVisible }) => {
            const pct = (timeLeft / TIMING.timeoutDuration) * 100;
            const barColor = pct > 40 ? COLORS.teal : pct > 15 ? COLORS.amber : COLORS.red;

            if (!isVisible) return null;

            return (
                <div
                    className="w-full shrink-0 relative"
                    style={{ height: LAYOUT.timeoutBarHeight, backgroundColor: '#E5E7EB' }}
                >
                    <div
                        className="absolute inset-y-0 left-0 transition-all duration-1000 ease-linear"
                        style={{ width: `${pct}%`, backgroundColor: barColor }}
                    />
                </div>
            );
        };


        // ============================================================
        // CAMERA VIEW (live feed via getUserMedia)
        // ============================================================
        const CameraView = ({ children }) => {
            const videoRef = useRef(null);
            const [cameraReady, setCameraReady] = useState(false);

            useEffect(() => {
                let stream = null;
                const startCamera = async () => {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } }
                        });
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            setCameraReady(true);
                        }
                    } catch (err) {
                        console.warn('Camera not available, using fallback:', err.message);
                    }
                };
                startCamera();
                return () => {
                    if (stream) stream.getTracks().forEach(t => t.stop());
                };
            }, []);

            return (
                <div className="flex-1 relative overflow-hidden" style={{ backgroundColor: '#111' }}>
                    {/* Live video feed */}
                    <video
                        ref={videoRef}
                        autoPlay
                        playsInline
                        muted
                        className="absolute inset-0 w-full h-full object-cover"
                        style={{ transform: 'scaleX(-1)' }}
                    />

                    {/* Fallback if no camera */}
                    {!cameraReady && (
                        <div className="absolute inset-0 flex items-center justify-center">
                            <div className="flex flex-col items-center gap-3 opacity-30">
                                <div className="w-16 h-16 border-2 border-white/40 rounded-xl flex items-center justify-center">
                                    <div className="w-3 h-3 rounded-full bg-white/40" />
                                </div>
                                <span className="text-white/40 font-mono text-[10px] tracking-[0.3em] uppercase">Camera Feed</span>
                            </div>
                        </div>
                    )}

                    {/* Darkening vignette for text legibility */}
                    <div className="absolute inset-0 pointer-events-none" style={{
                        background: 'linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.05) 70%, rgba(0,0,0,0.25) 100%)'
                    }} />

                    {/* Children (reticle, overlays, count card, etc.) */}
                    {children}
                </div>
            );
        };


        // ============================================================
        // RETICLE OVERLAY
        // ============================================================
        const Reticle = ({ isScanning }) => (
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div className="relative" style={{ width: '44%', aspectRatio: '4/3' }}>
                    {/* Corner brackets */}
                    <div className="reticle-corner reticle-corner--tl" style={{ top: 0, left: 0 }} />
                    <div className="reticle-corner reticle-corner--tr" style={{ top: 0, right: 0 }} />
                    <div className="reticle-corner reticle-corner--bl" style={{ bottom: 0, left: 0 }} />
                    <div className="reticle-corner reticle-corner--br" style={{ bottom: 0, right: 0 }} />

                    {/* Scanning line */}
                    {isScanning && (
                        <div
                            className="scan-line absolute left-[8%] right-[8%] h-[2px] pointer-events-none"
                            style={{ backgroundColor: `${COLORS.teal}99` }}
                        />
                    )}
                </div>
            </div>
        );


        // ============================================================
        // INSTRUCTION OVERLAY (text over camera)
        // ============================================================
        const InstructionOverlay = ({ hasItems }) => (
            <div className="absolute top-6 left-0 right-0 flex flex-col items-center pointer-events-none" style={{ animation: 'fadeIn 0.4s ease-out' }}>
                <div className="px-10 py-4 rounded-2xl" style={{ backgroundColor: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)' }}>
                    <h2 className="text-white font-display font-extrabold text-4xl text-center leading-tight">
                        {hasItems ? 'Scan more containers' : 'Scan your containers'}
                    </h2>
                    <p className="text-white/70 font-body text-xl text-center mt-1.5">
                        {hasItems ? 'Or scan your QR code to finish' : 'Hold each container in front of the camera'}
                    </p>
                </div>
            </div>
        );


        // ============================================================
        // COUNT CARD (frosted glass, right side)
        // ============================================================
        const CountCard = ({ count, justScanned, isVisible }) => {
            if (!isVisible) return null;

            return (
                <div
                    className="absolute right-6 bottom-6 w-64 pointer-events-none"
                    style={{ animation: 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1)' }}
                >
                    <div
                        className="rounded-2xl p-7 flex flex-col items-center border border-white/20 shadow-2xl"
                        style={{
                            backgroundColor: 'rgba(0,0,0,0.55)',
                            backdropFilter: 'blur(20px)',
                            WebkitBackdropFilter: 'blur(20px)',
                        }}
                    >
                        <span className="font-display text-sm font-bold uppercase tracking-[0.18em] text-white/55 mb-2">
                            Ready for Checkout
                        </span>

                        <div
                            className="relative"
                            style={{ animation: justScanned ? 'countPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)' : 'none' }}
                            key={count}
                        >
                            <span className="font-display text-8xl font-extrabold text-white leading-none">
                                {count}
                            </span>
                        </div>

                        <span className="font-body text-base font-semibold uppercase tracking-wider text-white/45 mt-2">
                            Container{count !== 1 ? 's' : ''}
                        </span>

                        {/* "Added" feedback chip */}
                        <div
                            className="mt-5 transition-all duration-300"
                            style={{ opacity: justScanned ? 1 : 0, transform: justScanned ? 'translateY(0)' : 'translateY(6px)' }}
                        >
                            <div
                                className="flex items-center gap-2 px-4 py-2 rounded-full"
                                style={{ backgroundColor: `${COLORS.teal}33`, border: `1px solid ${COLORS.teal}55` }}
                            >
                                <IconCheck className="w-4 h-4 text-emerald-300" style={{ strokeDasharray: 24, animation: justScanned ? 'checkDraw 0.3s ease-out forwards' : 'none' }} />
                                <span className="text-sm font-display font-bold uppercase tracking-wider text-emerald-300">Added</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // ============================================================
        // ERROR TOAST
        // ============================================================
        const ErrorToast = ({ message }) => {
            if (!message) return null;
            return (
                <div
                    className="absolute bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none"
                    style={{ animation: 'slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1)' }}
                >
                    <div
                        className="flex items-start gap-3 px-5 py-4 rounded-xl shadow-2xl max-w-sm border border-red-500/30"
                        style={{ backgroundColor: 'rgba(153, 27, 27, 0.9)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)' }}
                    >
                        <IconAlert className="w-6 h-6 text-red-200 shrink-0 mt-0.5" />
                        <p className="text-white font-body text-lg font-medium leading-snug">{message}</p>
                    </div>
                </div>
            );
        };


        // ============================================================
        // DOWNLOAD MODAL
        // ============================================================
        const DownloadModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div
                    className="absolute inset-0 z-50 flex items-center justify-center"
                    style={{ backgroundColor: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', animation: 'fadeIn 0.2s ease-out' }}
                    onClick={onClose}
                >
                    <div
                        className="bg-white rounded-3xl shadow-2xl max-w-lg w-full mx-6 overflow-hidden"
                        style={{ animation: 'scaleUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275)' }}
                        onClick={e => e.stopPropagation()}
                    >
                        {/* Header */}
                        <div className="p-6 pb-2 flex items-start justify-between">
                            <div className="flex items-center gap-3">

        const Footer = ({ hasItems, onCancel, onOpenDownload }) => (

            >
                {/* Left: app download icon + text */}

                    className="flex items-center gap-3 p-2 rounded-lg hover:bg-white/10 transition-colors group"

                        alt="Download app"
                        className="w-9 h-9 opacity-80 group-hover:opacity-100 transition-opacity"
                    />

                        Download the USEFULL app for iOS or Android and create an account to get started!
                    </span>
                </button>

                {/* Right: cancel button (only when items scanned) */}
                <div className="shrink-0 ml-4 flex justify-end">
                    {hasItems ? (
                        <button
                            onClick={onCancel}
                            className="flex items-center gap-2 px-5 py-2.5 rounded-lg border border-white/25 text-white/80 hover:bg-white/10 hover:text-white transition-all font-display text-sm font-bold uppercase tracking-wider"
                        >
                            <IconX className="w-4 h-4" />
                            Cancel
                        </button>
                    ) : (
                        <div />
                    )}
                </div>
            </div>
        );


        // ============================================================
        // SUCCESS MODAL
        // ============================================================
        const SuccessModal = ({ data, onDone }) => {
            if (!data) return null;
            return (
                <div
                    className="absolute inset-0 z-50 flex items-center justify-center"
                    style={{ backgroundColor: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', animation: 'fadeIn 0.2s ease-out' }}
                >
                    <div
                        className="bg-white rounded-3xl shadow-2xl max-w-md w-full mx-6 overflow-hidden"
                        style={{ animation: 'scaleUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275)' }}
                    >
                        <div className="p-8 text-center" style={{ backgroundColor: COLORS.teal }}>
                            {/* Checkmark circle */}
                            <div
                                className="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl"
                                style={{ animation: 'pulseGlow 2s ease-in-out infinite' }}
                            >
                                <IconCheck className="w-12 h-12" style={{ color: COLORS.teal }} />
                            </div>

                            <h2 className="text-white font-display text-3xl font-extrabold mb-2">

                            </h2>
                            <p className="text-white/80 font-body text-lg mb-8 leading-relaxed">
                                <span className="font-bold text-white text-2xl">{data.count}</span> container{data.count > 1 ? 's' : ''} checked out to<br/>

            );

        // ============================================================
        // DEV CONTROLS (fixed overlay for testing)
        // ============================================================
        const DevControls = ({ onScanContainer, onScanBadContainer, onScanUser }) => (
            <div className="fixed bottom-4 right-4 z-[100] flex items-center gap-2 px-4 py-2.5 rounded-xl border border-white/10 shadow-2xl"
                style={{ backgroundColor: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)' }}
            >

                    onClick={onScanContainer}

                    + Container
                </button>
                <button

                    className="px-3 py-1.5 rounded-lg text-[11px] font-display font-bold bg-amber-900/40 text-amber-200 border border-amber-700/40 transition-colors"
                >
                    ! Bad
                </button>
                <button
                    onClick={onScanUser}
                    className="px-3 py-1.5 rounded-lg text-[11px] font-display font-bold bg-blue-900/40 text-blue-200 border border-blue-700/40 transition-colors"
                >
                    ✓ User QR
                </button>
            </div>
        );


        // ============================================================
        // MAIN APP — state machine + composition
        // ============================================================
        const App = () => {
            const [items, setItems] = useState([]);
            const [status, setStatus] = useState('idle');       // idle | scanning | success
            const [error, setError] = useState(null);
            const [timeLeft, setTimeLeft] = useState(TIMING.timeoutDuration);
            const [successData, setSuccessData] = useState(null);
            const [justScanned, setJustScanned] = useState(false);
            const [showDownloadModal, setShowDownloadModal] = useState(false);

            // Derived state
            const hasItems = items.length > 0;
            const showTimeout = hasItems && status !== 'success';
            const currentStep = hasItems ? 2 : 1;

            // Timeout countdown
            useEffect(() => {
                if (!showTimeout) {
                    setTimeLeft(TIMING.timeoutDuration);
                    return;
                }
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) { handleCancel(); return TIMING.timeoutDuration; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [showTimeout]);

            const handleCancel = useCallback(() => {
                setItems([]);
                setStatus('idle');
                setError(null);
                setSuccessData(null);
                setTimeLeft(TIMING.timeoutDuration);
                setJustScanned(false);
            }, []);

            const handleScanContainer = useCallback(() => {
                setTimeLeft(TIMING.timeoutDuration);
                setItems(prev => [...prev, { id: Date.now() }]);
                setStatus('scanning');
                setError(null);
                setJustScanned(true);
                setTimeout(() => setJustScanned(false), TIMING.scanFeedbackMs);
            }, []);

            const handleScanBadContainer = useCallback(() => {
                setError("This container is already assigned to another user. Please try another USEFULL container.");
                setTimeLeft(TIMING.timeoutDuration);
                setTimeout(() => setError(null), TIMING.errorDisplayMs);
            }, []);

            const handleScanUser = useCallback(() => {
                if (items.length === 0) {
                    setError("Please scan a USEFULL container first.");
                    setTimeout(() => setError(null), 3000);
                    return;
                }
                setSuccessData({ user: "Owen", count: items.length });
                setStatus('success');
                setTimeout(() => handleCancel(), TIMING.successDisplayMs);
            }, [items.length, handleCancel]);

            return (
                <div className="h-full w-full flex flex-col overflow-hidden select-none relative">
                    {/* Shell: teal header with step indicators */}
                    <Header currentStep={currentStep} />

                    {/* Timeout bar (below header) */}
                    <TimeoutBar timeLeft={timeLeft} isVisible={showTimeout} />

                    {/* Content: full-bleed camera feed */}
                    <CameraView>
                        <Reticle isScanning={status !== 'success'} />
                        <InstructionOverlay hasItems={hasItems} />
                        <CountCard count={items.length} justScanned={justScanned} isVisible={hasItems && status !== 'success'} />
                        <ErrorToast message={error} />
                    </CameraView>

                    {/* Shell: teal footer */}
                    <Footer hasItems={hasItems} onCancel={handleCancel} onOpenDownload={() => setShowDownloadModal(true)} />

                    {/* Download modal */}
                    <DownloadModal isOpen={showDownloadModal} onClose={() => setShowDownloadModal(false)} />

                    {/* Success overlay */}
                    <SuccessModal data={status === 'success' ? successData : null} onDone={handleCancel} />

                    {/* Dev simulation controls */}
                    <DevControls
                        onScanContainer={handleScanContainer}
                        onScanBadContainer={handleScanBadContainer}
                        onScanUser={handleScanUser}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
