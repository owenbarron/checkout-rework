        * { box-sizing: border-box; }
        html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'DM Sans', sans-serif; background: #EEF2F3; }

        @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp   { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp   { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes digitPop  { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,140,149,0.3); } 50% { box-shadow: 0 0 0 16px rgba(0,140,149,0); } }

                    <path fill="#008c95" d="M141.57,73.67l-.29-.09c-10.6-3.34-17.04-5.84-17.04-12.37,0-6.19,5.89-10.04,15.37-10.04,10.06,0,16.82,4.22,16.82,10.5v1.38h6.41v-1.68c0-9.49-9.77-16.38-23.23-16.38s-22.09,6.64-22.09,16.53c0,11.6,12.64,15.48,21.87,18.31,10.7,3.24,17.72,5.87,17.72,12.6,0,6.19-6.12,10.04-15.98,10.04-10.56,0-17.65-4.22-17.65-10.5v-1.3h-6.41v1.61c0,9.64,9.9,16.38,24.07,16.38s22.77-6.46,22.77-16.45c0-11.74-12.91-15.66-22.34-18.53Z"/>
                    <polygon fill="#008c95" points="186.25 107.51 229.05 107.51 229.05 101.1 192.74 101.1 192.74 80.48 223.65 80.48 223.65 74.22 192.74 74.22 192.74 52.54 229.05 52.54 229.05 46.13 186.25 46.13 186.25 107.51"/>
                    <polygon fill="#008c95" points="252.78 106.51 267.93 106.51 267.93 86.18 292.21 86.18 292.21 72.4 267.93 72.4 267.93 61.9 296.86 61.9 296.86 47.13 252.78 47.13 252.78 106.51"/>

                    <path fill="#d5992c" d="M332.04,67.58h0c.02,15.56,12.64,28.17,28.2,28.17s28.18-12.61,28.2-28.17h0v-3.27h-56.4v3.27Z"/>
                    <path fill="#008c95" d="M395.47,46.41v10.86h0v10.32c-.02,19.41-15.83,35.2-35.24,35.2s-35.22-15.79-35.24-35.21v-31.58h0v-6.5s7.53,7.53,7.53,7.53l4.28-4.28-14.7-14.7-14.7,14.7,4.28,4.28,7.44-7.44v37.99c.03,22.65,18.47,41.07,41.11,41.07s41.08-18.42,41.11-41.06v-21.19h-5.87Z"/>

        // ============================================================
        // CAMERA BOX (shared with fullheight)
        // ============================================================
        const CameraBox = ({ isScanning, onQRResult, isPortrait, borderRadiusOverride }) => {
            const videoRef     = useRef(null);
            const containerRef = useRef(null);
            const canvasRef    = useRef(document.createElement('canvas'));
            const lastSeenRef  = useRef(null);
            const [cameraReady, setCameraReady] = useState(false);

            useEffect(() => {
                let stream = null;
                const startCamera = async () => {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } }
                        });
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            setCameraReady(true);
                        }
                    } catch (err) {
                        console.warn('Camera not available:', err.message);
                    }
                };
                startCamera();
                return () => { if (stream) stream.getTracks().forEach(t => t.stop()); };
            }, []);

            useEffect(() => {
                if (!isScanning || !onQRResult) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                const scan = () => {
                    const video     = videoRef.current;
                    const container = containerRef.current;
                    if (!video || !container || video.readyState < 2) return;

                    const cW = container.offsetWidth;
                    const cH = container.offsetHeight;
                    const vW = video.videoWidth;
                    const vH = video.videoHeight;
                    if (!vW || !vH) return;

                    const scale   = Math.max(cW / vW, cH / vH);
                    const offsetX = (cW - vW * scale) / 2;
                    const offsetY = (cH - vH * scale) / 2;

                    const cropX = Math.max(0, -offsetX / scale);
                    const cropY = Math.max(0, -offsetY / scale);
                    const cropW = Math.min(cW / scale, vW - cropX);
                    const cropH = Math.min(cH / scale, vH - cropY);

                    canvas.width  = Math.round(cropW);
                    canvas.height = Math.round(cropH);
                    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const result    = jsQR(imageData.data, canvas.width, canvas.height);

                    if (result) {
                        let decoded = result.data;
                        try { decoded = atob(result.data); } catch (_) {}
                        if (decoded === lastSeenRef.current) return;
                        lastSeenRef.current = decoded;
                        onQRResult(decoded);
                    }
                };

                const interval = setInterval(scan, 200);
                return () => clearInterval(interval);
            }, [isScanning, onQRResult]);

            const borderRadius = borderRadiusOverride !== undefined
                ? borderRadiusOverride
                : (isPortrait ? '0 0 24px 24px' : '16px');

            return (
                <div
                    ref={containerRef}
                    className="w-full h-full relative overflow-hidden"
                    style={{ backgroundColor: '#111', borderRadius }}
                >
                    <video
                        ref={videoRef}
                        autoPlay playsInline muted
                        className="absolute inset-0 w-full h-full object-cover"
                        style={{ transform: 'scaleX(-1)' }}
                    />

                    {isPortrait && (
                        <div className="absolute bottom-0 left-0 right-0 pointer-events-none"
                             style={{ height: 60, background: 'linear-gradient(to bottom, transparent, rgba(0,0,0,0.18))' }} />
                    )}

                    {!cameraReady && (
                        <div className="absolute inset-0 flex items-center justify-center">
                            <div className="flex flex-col items-center gap-3 opacity-20">
                                <div className="w-20 h-20 border-2 border-white/30 rounded-2xl flex items-center justify-center">
                                    <div className="w-4 h-4 rounded-full bg-white/30" />
                                </div>
                                <span className="text-white/30 font-mono text-xs tracking-[0.3em] uppercase">Camera Feed</span>
                            </div>
                        </div>
                    )}

                    {/* Corner brackets */}
                    {[
                        { top: 16, left: 16,   borderTop:    `6px solid ${TEAL}`, borderLeft:   `6px solid ${TEAL}`, borderRadius: '6px 0 0 0' },
                        { top: 16, right: 16,  borderTop:    `6px solid ${TEAL}`, borderRight:  `6px solid ${TEAL}`, borderRadius: '0 6px 0 0' },
                        { bottom: 16, left: 16,  borderBottom: `6px solid ${TEAL}`, borderLeft:   `6px solid ${TEAL}`, borderRadius: '0 0 0 6px' },
                        { bottom: 16, right: 16, borderBottom: `6px solid ${TEAL}`, borderRight:  `6px solid ${TEAL}`, borderRadius: '0 0 6px 0' },
                    ].map((s, i) => (
                        <div key={i} className="absolute pointer-events-none" style={{ ...s, width: 64, height: 64 }} />
                    ))}

                    {isScanning && (
                        <div className="scan-line absolute left-[8%] right-[8%] h-[2px] pointer-events-none"
                             style={{ backgroundColor: `${TEAL}AA` }} />
                    )}
                </div>
            );
        };

        // ============================================================
        // COUNT CARD
        // ============================================================
        const CountCard = ({ count, justScanned }) => (

                </span>

                    <span className="font-display font-black text-slate-800 leading-none"

                        {count}
                    </span>
                    <div style={{

                        right: 'calc(100% + 0.6rem)',
                        top: '50%',
                        width: '3rem',
                        height: '3rem',

                        opacity: justScanned ? 1 : 0,
                        transition: 'opacity 0.25s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)',
                        pointerEvents: 'none',
                        boxShadow: `0 2px 8px ${TEAL}55`,
                    }}>

                              style={{ color: 'white', fontSize: '1.1rem', lineHeight: 1 }}>+1</span>
                    </div>
                </div>

                <span className="font-body font-semibold text-gray-400 uppercase tracking-wider"
                      style={{ fontSize: '1.4rem' }}>
                    Container{count !== 1 ? 's' : ''}
                </span>
            </div>
        );

        // ============================================================
        // ERROR TOAST
        // ============================================================
        const ErrorToast = ({ message }) => {
            if (!message) return null;
            return (
                <div className="absolute bottom-4 left-4 right-4 z-50 pointer-events-none"
                     style={{ animation: 'slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1)' }}>
                    <div className="flex items-start gap-3 px-5 py-4 rounded-xl shadow-xl border border-red-100 max-w-lg"
                         style={{ backgroundColor: '#FEF2F2' }}>
                        <IconAlert className="w-6 h-6 text-red-500 shrink-0 mt-0.5" />
                        <p className="text-red-700 font-body text-lg font-medium leading-snug">{message}</p>
                    </div>

                    maxWidth: 'min(320px, calc(100vw - 48px))',
                    backgroundColor: 'rgba(255,255,255,0.97)',
                    border: '1px solid rgba(148, 163, 184, 0.2)',
                    borderRadius: 14,
                    boxShadow: '0 18px 40px rgba(15, 23, 42, 0.14)',
                    padding: '14px 14px 12px',
                    backdropFilter: 'blur(10px)',
                    WebkitBackdropFilter: 'blur(10px)',
                }}>
                    <div className="font-display font-bold uppercase tracking-wider"
                         style={{ color: '#94a3b8', fontSize: '0.72rem', marginBottom: 8 }}>
                        Mock card lookups
                    </div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                        {Object.entries(MOCK_STUDENTS).map(([code, list]) => (
                            <button
                                key={code}
                                onClick={() => onFillCard(code)}
                                className="font-body"
                                style={{
                                    padding: '7px 11px',
                                    border: '1px solid #dbe3ea',
                                    borderRadius: 8,
                                    fontSize: '0.85rem',
                                    backgroundColor: 'white',
                                    cursor: 'pointer',
                                    color: '#0f172a',
                                }}
                                title={list.map(s => s.name).join(', ')}
                            >
                                {code} ({list.length})
                            </button>
                        ))}
                        <button
                            onClick={() => onFillCard('9999')}
                            className="font-body"
                            style={{
                                padding: '7px 11px',
                                border: '1px solid #fecaca',
                                borderRadius: 8,
                                fontSize: '0.85rem',
                                backgroundColor: '#FEF2F2',
                                cursor: 'pointer',
                                color: '#991b1b',
                            }}
                            title="No matching account"
                        >
                            9999 (none)
                        </button>
                    </div>

                    <div className="font-display font-bold uppercase tracking-wider"
                         style={{ color: '#94a3b8', fontSize: '0.72rem', marginTop: 16, marginBottom: 6 }}>
                        Sounds
                    </div>
                    <SoundSelectRow
                        label="Container Success"
                        value={containerSuccessSound}
                        onChange={onContainerSuccessSoundChange}
                        onPreview={onPreviewContainerSuccessSound}
                    />
                    <SoundSelectRow
                        label="Final Success"
                        value={finalSuccessSound}
                        onChange={onFinalSuccessSoundChange}
                        onPreview={onPreviewFinalSuccessSound}
                    />
                    <SoundSelectRow
                        label="Error"
                        value={errorSound}
                        onChange={onErrorSoundChange}
                        onPreview={onPreviewErrorSound}
                    />
                </div>
            );
        };

        // ============================================================
        // MAIN APP
        // ============================================================
        const App = () => {
            // Flow state
            const [mode, setMode]                   = useState('lastFour'); // 'lastFour' | 'qr'
            const [phase, setPhase]                 = useState('lookup');    // 'lookup' | 'selectName' | 'noAccount' | 'scanning' | 'success'
            const [digits, setDigits]               = useState('');
            const [matches, setMatches]             = useState([]);
            const [cardEnd, setCardEnd]             = useState('');          // last 4 used for current lookup (display)
            const [selectedUser, setSelectedUser]   = useState(null);

            // Container scan state
            const [items, setItems]                 = useState([]);
            const [error, setError]                 = useState(null);
            const [timeLeft, setTimeLeft]           = useState(60);
            const [successData, setSuccessData]     = useState(null);
            const [justScanned, setJustScanned]     = useState(false);

            // Misc UI state
            const [showAccessModal, setShowAccessModal]     = useState(false);
            const [isPortrait, setIsPortrait]               = useState(() => window.innerHeight > window.innerWidth);
            const [showMockSettings, setShowMockSettings]   = useState(false);

            // Sound prefs
            const [containerSuccessSound, setContainerSuccessSound] = useState('successful-scan');
            const [finalSuccessSound, setFinalSuccessSound]         = useState('final-success-chime-1');
            const [errorSound, setErrorSound]                       = useState('error');

            const scannedCodesRef = useRef(new Set());
            const audioCtxRef     = useRef(null);
            const soundBuffersRef = useRef({});
            const mockPanelRef    = useRef(null);

            // Orientation
            useEffect(() => {
                const mq = window.matchMedia('(orientation: portrait)');
                const handler = (e) => setIsPortrait(e.matches);
                mq.addEventListener('change', handler);
                return () => mq.removeEventListener('change', handler);
            }, []);

            // Click-outside for settings panel
            useEffect(() => {
                if (!showMockSettings) return;
                const handlePointerDown = (event) => {
                    if (!mockPanelRef.current?.contains(event.target)) {
                        setShowMockSettings(false);
                    }
                };
                document.addEventListener('mousedown', handlePointerDown);
                document.addEventListener('touchstart', handlePointerDown);
                return () => {
                    document.removeEventListener('mousedown', handlePointerDown);
                    document.removeEventListener('touchstart', handlePointerDown);
                };
            }, [showMockSettings]);

            // Audio unlock
            useEffect(() => {
                const unlock = async () => {
                    if (audioCtxRef.current) return;
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxRef.current = ctx;
                    try {
                        await Promise.all(SOUND_OPTIONS.map(async ({ value, path }) => {
                            const res = await fetch(path);
                            if (!res.ok) throw new Error(`Failed to load ${path}`);
                            const buf = await res.arrayBuffer();
                            soundBuffersRef.current[value] = await ctx.decodeAudioData(buf);
                        }));
                    } catch (_) {}
                };
                document.addEventListener('touchstart', unlock, { once: true });
                document.addEventListener('click',      unlock, { once: true });
                return () => {
                    document.removeEventListener('touchstart', unlock);
                    document.removeEventListener('click',      unlock);
                };
            }, []);

            const playSound = useCallback((soundKey) => {
                const ctx = audioCtxRef.current;
                const buffer = soundBuffersRef.current[soundKey];
                if (!ctx || !buffer) return;
                if (ctx.state === 'suspended') ctx.resume().catch(() => {});
                const src = ctx.createBufferSource();
                src.buffer = buffer;
                src.connect(ctx.destination);
                src.start(0);
            }, []);

            // Reset to start
            const resetAll = useCallback(() => {
                setMode('lastFour');
                setPhase('lookup');
                setDigits('');
                setMatches([]);
                setCardEnd('');
                setSelectedUser(null);
                setItems([]);
                setError(null);
                setTimeLeft(60);
                setSuccessData(null);
                setJustScanned(false);
                scannedCodesRef.current.clear();
            }, []);

            // Cancel current student (drop scans + go back to lookup)
            const handleCancelStudent = useCallback(() => {
                setItems([]);
                setSelectedUser(null);
                setDigits('');
                setMatches([]);
                setCardEnd('');
                setError(null);
                setTimeLeft(60);
                setJustScanned(false);
                setPhase('lookup');
                scannedCodesRef.current.clear();
            }, []);

            // Lookup a 4-digit card number
            const performLookup = useCallback((code) => {
                const results = MOCK_STUDENTS[code] || [];
                setMatches(results);
                setCardEnd(code);
                if (results.length === 0) {
                    playSound(errorSound);
                    setPhase('noAccount');
                } else {
                    setPhase('selectName');
                }
            }, [errorSound, playSound]);

            // Keypad handlers
            const handleDigit = useCallback((d) => {
                setDigits(prev => {
                    if (prev.length >= 4) return prev;
                    const next = prev + d;
                    if (next.length === 4) {
                        // defer lookup so user sees the digit first
                        setTimeout(() => performLookup(next), 180);
                    }
                    return next;
                });
            }, [performLookup]);

            const handleBackspace = useCallback(() => {
                setDigits(prev => prev.slice(0, -1));
            }, []);

            const handleFillCard = useCallback((code) => {
                setShowMockSettings(false);
                setDigits(code);
                setTimeout(() => performLookup(code), 180);
            }, [performLookup]);

            // Confirm a student (from name select modal)
            const handleSelectStudent = useCallback((student) => {
                setSelectedUser(student);
                setPhase('scanning');
                setItems([]);
                setTimeLeft(60);
                scannedCodesRef.current.clear();
            }, []);

            // No-account: switch to QR mode for this student
            const handleSwitchToQRFromNoAccount = useCallback(() => {
                setMode('qr');
                setPhase('lookup');
                setDigits('');
                setMatches([]);
                setCardEnd('');
            }, []);

            const handleTryAgain = useCallback(() => {
                setPhase('lookup');
                setDigits('');
                setMatches([]);
                setCardEnd('');
            }, []);

            // Container scan
            const handleScanContainer = useCallback(() => {
                playSound(containerSuccessSound);
                setTimeLeft(60);
                setItems(prev => [...prev, { id: Date.now() }]);
                setError(null);
                setJustScanned(true);
                setTimeout(() => setJustScanned(false), 1500);
            }, [containerSuccessSound, playSound]);

            // Mock cup scan trigger (footer button) — only meaningful while scanning
            const handleMockCupScan = useCallback(() => {
                if (phase !== 'scanning') return;
                handleScanContainer();
            }, [phase, handleScanContainer]);

            // Done = finalize checkout
            const handleDone = useCallback(() => {
                if (items.length === 0 || !selectedUser) {
                    playSound(errorSound);
                    setError('Scan at least one container before tapping Done.');
                    setTimeout(() => setError(null), 3000);
                    return;
                }
                playSound(finalSuccessSound);
                const outcome = { kind: 'success', user: selectedUser.name, count: items.length };
                setSuccessData(outcome);
                setPhase('success');
                setTimeout(() => resetAll(), 6000);
            }, [errorSound, finalSuccessSound, items.length, playSound, resetAll, selectedUser]);

            // QR results
            const handleQRResult = useCallback((decoded) => {
                if (scannedCodesRef.current.has(decoded)) return;
                scannedCodesRef.current.add(decoded);

                if (phase === 'lookup' && mode === 'qr') {
                    if (decoded.startsWith('user')) {
                        // Authenticate via QR — mock student
                        const user = { name: 'Lillian Lyons', cardEnd: '••••' };
                        setSelectedUser(user);
                        setItems([]);
                        setTimeLeft(60);
                        scannedCodesRef.current.clear();
                        setPhase('scanning');
                    } else {
                        playSound(errorSound);
                        setError('Scan a USEFULL ID QR code (starts with "user").');
                        setTimeout(() => setError(null), 5000);
                    }
                    return;
                }

                if (phase === 'scanning') {
                    if (decoded.startsWith('cup')) {
                        handleScanContainer();
                    } else if (decoded.startsWith('user')) {
                        playSound(errorSound);
                        setError('Already authenticated — scan containers now.');
                        setTimeout(() => setError(null), 3000);
                    } else {
                        playSound(errorSound);
                        setError('Unrecognized QR code');
                        setTimeout(() => setError(null), 5000);
                    }
                    return;
                }
            }, [phase, mode, errorSound, handleScanContainer, playSound]);

            // Inactivity timeout while scanning containers
            useEffect(() => {
                if (phase !== 'scanning') { setTimeLeft(60); return; }
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) { handleCancelStudent(); return 60; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [phase, handleCancelStudent]);

            // Mode toggle: clear in-progress lookup
            const handleModeChange = useCallback((next) => {
                if (phase !== 'lookup') return; // only switchable while looking up
                setMode(next);
                setDigits('');
                setMatches([]);
                setCardEnd('');
            }, [phase]);

            // Camera should run when in QR-lookup mode OR while scanning containers
            const cameraActive = (phase === 'lookup' && mode === 'qr') || phase === 'scanning';

            // Physical keyboard input — useful for demos
            useEffect(() => {
                if (phase !== 'lookup' || mode !== 'lastFour') return;
                const onKey = (e) => {
                    if (e.metaKey || e.ctrlKey || e.altKey) return;
                    if (showAccessModal || showMockSettings) return;
                    if (/^[0-9]$/.test(e.key)) {
                        e.preventDefault();
                        handleDigit(e.key);
                    } else if (e.key === 'Backspace' || e.key === 'Delete') {
                        e.preventDefault();
                        handleBackspace();
                    }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [phase, mode, showAccessModal, showMockSettings, handleDigit, handleBackspace]);

            // ========================================================
            // RENDER
            // ========================================================
            const showKeypad   = phase === 'lookup' && mode === 'lastFour';
            const showQRLookup = phase === 'lookup' && mode === 'qr';
            const showScanning = phase === 'scanning';

            return (
                <div className="h-full w-full flex flex-col overflow-hidden select-none relative"
                     style={{
                         backgroundColor: '#EEF2F3',
                         padding: isPortrait ? '14px 16px 10px' : '18px 22px 14px',
                         gap: isPortrait ? 12 : 16,
                     }}>

                    {/* HEADER */}
                    <div style={{
                        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                        gap: 16, width: '100%',
                    }}>
                        <div className="flex flex-col items-start">
                            <UsefullLogo style={{ height: isPortrait ? '2.6rem' : '3.2rem' }} className="w-auto" />
                            <p className="font-display font-bold uppercase tracking-[0.2em]"
                               style={{ color: TEAL, fontSize: isPortrait ? '0.75rem' : '0.85rem',
                                        marginTop: '-0.5rem', paddingLeft: '0.78rem' }}>
                                Front of House
                            </p>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12 }}>
                            {phase === 'lookup' && (
                                <ModeToggle mode={mode} onChange={handleModeChange} />
                            )}
                            {phase === 'scanning' && selectedUser && (
                                <StudentBanner name={selectedUser.name} />
                            )}
                        </div>
                    </div>

                    {/* BODY — single persistent container; sub-views toggle visibility */}
                    <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>

                        {/* KEYPAD VIEW */}
                        <div style={{
                            position: 'absolute', inset: 0,
                            display: showKeypad ? 'flex' : 'none',
                            flexDirection: 'column',
                            alignItems: 'center', justifyContent: 'center',
                            gap: isPortrait ? 18 : 22,
                            padding: isPortrait ? '8px 0' : '4px 0',
                        }}>
                            <div className="text-center" style={{ padding: '0 12px' }}>
                                <h1 className="font-display font-extrabold leading-tight"
                                    style={{ color: TEAL, fontSize: isPortrait ? '2.2rem' : '2.6rem' }}>
                                    Look up student
                                </h1>
                                <p className="font-body mt-1.5"
                                   style={{ color: '#6B7280', fontSize: isPortrait ? '1rem' : '1.15rem' }}>
                                    Enter the last 4 digits of the campus card on the Grubhub receipt
                                </p>
                            </div>
                            <DigitDisplay digits={digits} />
                            <NumericKeypad
                                onDigit={handleDigit}
                                onBackspace={handleBackspace}
                                disabled={digits.length >= 4}
                            />
                        </div>

                        {/* CAMERA VIEW — persistent for both QR-lookup and container-scanning */}
                        <div style={{
                            position: 'absolute', inset: 0,
                            display: (showQRLookup || showScanning) ? 'flex' : 'none',
                            flexDirection: isPortrait ? 'column' : 'row',
                            gap: 20,
                            alignItems: 'stretch',
                        }}>
                            <div style={{
                                flex: isPortrait ? '0 0 60%' : '0 0 60%',
                                minHeight: isPortrait ? 220 : 'auto',
                                position: 'relative',
                            }}>
                                <CameraBox
                                    isScanning={cameraActive}
                                    onQRResult={handleQRResult}
                                    isPortrait={false}
                                    borderRadiusOverride="20px"
                                />
                                <ErrorToast message={error} />
                            </div>

                            {/* Right side prompt — content swaps based on phase */}
                            {showQRLookup && (
                                <div style={{
                                    flex: 1,
                                    display: 'flex', flexDirection: 'column',
                                    alignItems: 'center', justifyContent: 'center',
                                    textAlign: 'center', padding: '12px', gap: 12,
                                }}>
                                    <div style={{
                                        width: 64, height: 64, borderRadius: 18,
                                        background: TEAL_LIGHT,
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        color: TEAL,
                                    }}>
                                        <IconQR style={{ width: 32, height: 32 }} />
                                    </div>
                                    <h1 className="font-display font-extrabold leading-tight"
                                        style={{ color: TEAL, fontSize: isPortrait ? '1.85rem' : '2.4rem' }}>
                                        Scan the student's<br/>USEFULL QR
                                    </h1>
                                    <p className="font-body"
                                       style={{ color: '#6B7280', fontSize: isPortrait ? '1rem' : '1.1rem', maxWidth: 360 }}>
                                        Have them open the USEFULL app and hold their QR code in front of the camera.
                                    </p>
                                </div>
                            )}

                            {showScanning && (
                                <div style={{
                                    flex: 1,
                                    display: 'flex', flexDirection: 'column',
                                    alignItems: 'center', justifyContent: 'center',
                                    gap: 16, padding: '8px', textAlign: 'center',
                                }}>
                                    <div>
                                        <h1 className="font-display font-extrabold leading-tight"
                                            style={{ color: TEAL, fontSize: isPortrait ? '2.1rem' : '2.6rem' }}>
                                            Scan user containers
                                        </h1>
                                        <p className="font-body mt-2"
                                           style={{ color: '#6B7280', fontSize: isPortrait ? '1.05rem' : '1.2rem' }}>
                                            Hold each USEFULL container in front of the camera, then tap Done.
                                        </p>
                                    </div>
                                    <div style={{ width: '100%', maxWidth: 340, display: 'flex', flexDirection: 'column', gap: 14 }}>
                                        <CountCard count={items.length} justScanned={justScanned} />
                                        <DoneButton count={items.length} onClick={handleDone} />
                                    </div>
                                </div>
                            )}
                        </div>

                    </div>

                    {/* FOOTER */}
                    <div className="shrink-0 flex items-center gap-3"
                         style={{ borderTop: '1px solid rgba(0,140,149,0.12)', paddingTop: 12 }}>
                        <div ref={mockPanelRef} style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 8 }}>
                            {showMockSettings && (
                                <div style={{
                                    position: 'absolute',
                                    left: 0, bottom: 'calc(100% + 12px)',
                                    zIndex: 40,
                                }}>
                                    <MockSettingsPanel
                                        containerSuccessSound={containerSuccessSound}
                                        onContainerSuccessSoundChange={(e) => setContainerSuccessSound(e.target.value)}
                                        onPreviewContainerSuccessSound={() => playSound(containerSuccessSound)}
                                        finalSuccessSound={finalSuccessSound}
                                        onFinalSuccessSoundChange={(e) => setFinalSuccessSound(e.target.value)}
                                        onPreviewFinalSuccessSound={() => playSound(finalSuccessSound)}
                                        errorSound={errorSound}
                                        onErrorSoundChange={(e) => setErrorSound(e.target.value)}
                                        onPreviewErrorSound={() => playSound(errorSound)}
                                        onFillCard={handleFillCard}
                                    />
                                </div>
                            )}
                            <SettingsButton onPress={() => setShowMockSettings(v => !v)} />
                            <CloseButton onPress={() => setShowAccessModal(true)} />
                            <div style={{ width: 14 }} />
                            <CupScanButton onPress={handleMockCupScan} disabled={phase !== 'scanning'} />
                        </div>

                        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 12 }}>
                            {phase === 'scanning' && (
                                <CircularCancelButton timeLeft={timeLeft} total={60} onCancel={handleCancelStudent} />
                            )}
                        </div>
                    </div>

                    {/* MODALS */}
                    <AccessCodeModal isOpen={showAccessModal} onClose={() => { resetAll(); setShowAccessModal(false); }} />
                    {phase === 'selectName' && (
                        <NameSelectModal
                            matches={matches}
                            cardEnd={cardEnd}
                            onSelect={handleSelectStudent}
                            onCancel={handleTryAgain}
                        />
                    )}
                    {phase === 'noAccount' && (
                        <NoAccountModal
                            cardEnd={cardEnd}
                            onTryAgain={handleTryAgain}
                            onSwitchToQR={handleSwitchToQRFromNoAccount}
                        />
                    )}
                    <OutcomeModal data={phase === 'success' ? successData : null} onDone={resetAll} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
