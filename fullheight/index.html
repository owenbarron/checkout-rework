<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>USEFULL Checkout Kiosk</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="USEFULL">
    <link rel="apple-touch-icon" href="../USEFULL-Icon-Registered_Color.svg">
    <link rel="icon" type="image/svg+xml" href="../USEFULL-Icon-Registered_Color.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                        body:    ['"DM Sans"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; }
        html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'DM Sans', sans-serif; background: #EEF2F3; }

        @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp   { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp   { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes countPop  { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
        @keyframes checkDraw { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,140,149,0.3); } 50% { box-shadow: 0 0 0 16px rgba(0,140,149,0); } }
        @keyframes scanLine  {
            0%   { top: 8%; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 92%; opacity: 0; }
        }
        .scan-line { animation: scanLine 2.2s ease-in-out infinite; }

        /* Portrait-only: teal gradient divider between camera and content */
        .camera-content-divider {
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(0,140,149,0.15), rgba(0,140,149,0.3), rgba(0,140,149,0.15), transparent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ============================================================
        // CONSTANTS
        // ============================================================
        const TEAL       = '#008C95';
        const TEAL_LIGHT = '#E6F4F5';

        // ============================================================
        // ICONS
        // ============================================================
        const IconX = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        );
        const IconCheck = ({ className, style }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
                <path d="M20 6 9 17l-5-5"/>
            </svg>
        );
        const IconAlert = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
        );
        const IconQR = ({ style }) => (
            <svg viewBox="0 0 24 24" fill="currentColor" style={style}>
                {/* Top-left finder */}
                <rect x="2"  y="2"  width="9" height="9" rx="1.5" fill="none" stroke="currentColor" strokeWidth="1.5"/>
                <rect x="4.5" y="4.5" width="4" height="4"/>
                {/* Top-right finder */}
                <rect x="13" y="2"  width="9" height="9" rx="1.5" fill="none" stroke="currentColor" strokeWidth="1.5"/>
                <rect x="15.5" y="4.5" width="4" height="4"/>
                {/* Bottom-left finder */}
                <rect x="2"  y="13" width="9" height="9" rx="1.5" fill="none" stroke="currentColor" strokeWidth="1.5"/>
                <rect x="4.5" y="15.5" width="4" height="4"/>
                {/* Data cells */}
                <rect x="13" y="13" width="2.5" height="2.5"/>
                <rect x="17" y="13" width="2.5" height="2.5"/>
                <rect x="13" y="17" width="2.5" height="2.5"/>
                <rect x="17" y="17" width="2.5" height="2.5"/>
                <rect x="20" y="15" width="2" height="2"/>
                <rect x="15" y="20" width="2" height="2"/>
                <rect x="19" y="20" width="3" height="2"/>
            </svg>
        );

        // ============================================================
        // USEFULL LOGO — full wordmark
        // ============================================================
        const UsefullLogo = ({ className, style }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 144" className={className} style={style}>
                <g>
                    <path fill="#008c95" d="M88.85,83.9c0,11.31-7.44,18.34-19.4,18.34s-19.4-7.03-19.4-18.34V46.13h-6.49v37.92c0,14.94,10.16,24.6,25.89,24.6s25.89-9.66,25.89-24.6V46.13h-6.49v37.77Z"/>
                    <path fill="#008c95" d="M141.57,73.67l-.29-.09c-10.6-3.34-17.04-5.84-17.04-12.37,0-6.19,5.89-10.04,15.37-10.04,10.06,0,16.82,4.22,16.82,10.5v1.38h6.41v-1.68c0-9.49-9.77-16.38-23.23-16.38s-22.09,6.64-22.09,16.53c0,11.6,12.64,15.48,21.87,18.31,10.7,3.24,17.72,5.87,17.72,12.6,0,6.19-6.12,10.04-15.98,10.04-10.56,0-17.65-4.22-17.65-10.5v-1.3h-6.41v1.61c0,9.64,9.9,16.38,24.07,16.38s22.77-6.46,22.77-16.45c0-11.74-12.91-15.66-22.34-18.53Z"/>
                    <polygon fill="#008c95" points="186.25 107.51 229.05 107.51 229.05 101.1 192.74 101.1 192.74 80.48 223.65 80.48 223.65 74.22 192.74 74.22 192.74 52.54 229.05 52.54 229.05 46.13 186.25 46.13 186.25 107.51"/>
                    <polygon fill="#008c95" points="252.78 106.51 267.93 106.51 267.93 86.18 292.21 86.18 292.21 72.4 267.93 72.4 267.93 61.9 296.86 61.9 296.86 47.13 252.78 47.13 252.78 106.51"/>
                    <polygon fill="#008c95" points="438.58 47.13 423.43 47.13 423.43 106.51 467.05 106.51 467.05 91.82 438.58 91.82 438.58 47.13"/>
                    <polygon fill="#008c95" points="503.97 91.82 503.97 47.13 488.82 47.13 488.82 106.51 532.45 106.51 532.45 91.82 503.97 91.82"/>
                    <path fill="#d5992c" d="M332.04,67.58h0c.02,15.56,12.64,28.17,28.2,28.17s28.18-12.61,28.2-28.17h0v-3.27h-56.4v3.27Z"/>
                    <path fill="#008c95" d="M395.47,46.41v10.86h0v10.32c-.02,19.41-15.83,35.2-35.24,35.2s-35.22-15.79-35.24-35.21v-31.58h0v-6.5s7.53,7.53,7.53,7.53l4.28-4.28-14.7-14.7-14.7,14.7,4.28,4.28,7.44-7.44v37.99c.03,22.65,18.47,41.07,41.11,41.07s41.08-18.42,41.11-41.06v-21.19h-5.87Z"/>
                </g>
                <path fill="#58595b" d="M538.09,42.25c4.09,0,7.41,3.32,7.41,7.41s-3.32,7.41-7.41,7.41-7.41-3.32-7.41-7.41,3.32-7.41,7.41-7.41Zm0,13.84c3.57,0,6.43-2.87,6.43-6.43s-2.87-6.43-6.43-6.43-6.43,2.87-6.43,6.43,2.87,6.43,6.43,6.43Zm2.2-3.02l-1.46-2.53h-2.47v2.53h-.92v-7.16h3.29c1.55,0,2.44,1.07,2.44,2.32,0,.95-.52,1.8-1.43,2.13l1.59,2.71h-1.04Zm-3.93-6.25v2.8h2.35c.98,0,1.55-.7,1.55-1.4s-.58-1.4-1.55-1.4h-2.35Z"/>
            </svg>
        );

        // ============================================================
        // CAMERA BOX
        // ============================================================
        const CameraBox = ({ isScanning, onQRResult, isPortrait }) => {
            const videoRef     = useRef(null);
            const containerRef = useRef(null);
            const canvasRef    = useRef(document.createElement('canvas'));
            const lastSeenRef  = useRef(null);
            const [cameraReady, setCameraReady] = useState(false);

            useEffect(() => {
                let stream = null;
                const startCamera = async () => {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } }
                        });
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            setCameraReady(true);
                        }
                    } catch (err) {
                        console.warn('Camera not available:', err.message);
                    }
                };
                startCamera();
                return () => { if (stream) stream.getTracks().forEach(t => t.stop()); };
            }, []);

            useEffect(() => {
                if (!isScanning || !onQRResult) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                const scan = () => {
                    const video     = videoRef.current;
                    const container = containerRef.current;
                    if (!video || !container || video.readyState < 2) return;

                    const cW = container.offsetWidth;
                    const cH = container.offsetHeight;
                    const vW = video.videoWidth;
                    const vH = video.videoHeight;
                    if (!vW || !vH) return;

                    const scale   = Math.max(cW / vW, cH / vH);
                    const offsetX = (cW - vW * scale) / 2;
                    const offsetY = (cH - vH * scale) / 2;

                    const cropX = Math.max(0, -offsetX / scale);
                    const cropY = Math.max(0, -offsetY / scale);
                    const cropW = Math.min(cW / scale, vW - cropX);
                    const cropH = Math.min(cH / scale, vH - cropY);

                    canvas.width  = Math.round(cropW);
                    canvas.height = Math.round(cropH);
                    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const result    = jsQR(imageData.data, canvas.width, canvas.height);

                    if (result) {
                        let decoded = result.data;
                        try { decoded = atob(result.data); } catch (_) {}
                        if (decoded === lastSeenRef.current) return;
                        lastSeenRef.current = decoded;
                        onQRResult(decoded);
                    }
                };

                const interval = setInterval(scan, 200);
                return () => clearInterval(interval);
            }, [isScanning, onQRResult]);

            const borderRadius = isPortrait ? '0 0 24px 24px' : '16px';

            return (
                <div
                    ref={containerRef}
                    className="w-full h-full relative overflow-hidden"
                    style={{ backgroundColor: '#111', borderRadius }}
                >
                    <video
                        ref={videoRef}
                        autoPlay playsInline muted
                        className="absolute inset-0 w-full h-full object-cover"
                        style={{ transform: 'scaleX(-1)' }}
                    />

                    {isPortrait && (
                        <div className="absolute bottom-0 left-0 right-0 pointer-events-none"
                             style={{ height: 60, background: 'linear-gradient(to bottom, transparent, rgba(0,0,0,0.18))' }} />
                    )}

                    {!cameraReady && (
                        <div className="absolute inset-0 flex items-center justify-center">
                            <div className="flex flex-col items-center gap-3 opacity-20">
                                <div className="w-20 h-20 border-2 border-white/30 rounded-2xl flex items-center justify-center">
                                    <div className="w-4 h-4 rounded-full bg-white/30" />
                                </div>
                                <span className="text-white/30 font-mono text-xs tracking-[0.3em] uppercase">Camera Feed</span>
                            </div>
                        </div>
                    )}

                    {/* Corner brackets */}
                    {[
                        { top: 16, left: 16,   borderTop:    `6px solid ${TEAL}`, borderLeft:   `6px solid ${TEAL}`, borderRadius: '6px 0 0 0' },
                        { top: 16, right: 16,  borderTop:    `6px solid ${TEAL}`, borderRight:  `6px solid ${TEAL}`, borderRadius: '0 6px 0 0' },
                        { bottom: 16, left: 16,  borderBottom: `6px solid ${TEAL}`, borderLeft:   `6px solid ${TEAL}`, borderRadius: '0 0 0 6px' },
                        { bottom: 16, right: 16, borderBottom: `6px solid ${TEAL}`, borderRight:  `6px solid ${TEAL}`, borderRadius: '0 0 6px 0' },
                    ].map((s, i) => (
                        <div key={i} className="absolute pointer-events-none" style={{ ...s, width: 64, height: 64 }} />
                    ))}

                    {isScanning && (
                        <div className="scan-line absolute left-[8%] right-[8%] h-[2px] pointer-events-none"
                             style={{ backgroundColor: `${TEAL}AA` }} />
                    )}
                </div>
            );
        };

        // ============================================================
        // COUNT CARD — vertical layout, dark gray number
        // ============================================================
        const CountCard = ({ count, justScanned }) => (
            <div
                className="w-full bg-white rounded-2xl border border-gray-100 shadow-lg flex flex-col items-center justify-center"
                style={{ animation: 'scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)', padding: '20px 12px', gap: 2 }}
            >
                <span className="font-display font-bold uppercase text-center"
                      style={{ color: TEAL, fontSize: '1rem', letterSpacing: '0.12em' }}>
                    Ready for Checkout
                </span>

                <div style={{ animation: justScanned ? 'countPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)' : 'none' }} key={count}>
                    <span className="font-display font-black text-slate-800 leading-none"
                          style={{ fontSize: '7rem', lineHeight: 1 }}>
                        {count}
                    </span>
                </div>

                <span className="font-body font-semibold text-gray-400 uppercase tracking-wider"
                      style={{ fontSize: '1.4rem' }}>
                    Container{count !== 1 ? 's' : ''}
                </span>

                <div style={{ marginTop: 10, opacity: justScanned ? 1 : 0,
                              transform: justScanned ? 'translateY(0)' : 'translateY(4px)',
                              transition: 'all 0.3s ease' }}>
                    <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-full"
                         style={{ backgroundColor: TEAL_LIGHT, border: `1px solid ${TEAL}30` }}>
                        <IconCheck style={{ color: TEAL, width: 15, height: 15,
                                           strokeDasharray: 24,
                                           animation: justScanned ? 'checkDraw 0.3s ease-out forwards' : 'none' }} />
                        <span className="font-display font-black uppercase tracking-wider"
                              style={{ color: TEAL, fontSize: '0.85rem' }}>Added</span>
                    </div>
                </div>
            </div>
        );

        // ============================================================
        // ERROR TOAST
        // ============================================================
        const ErrorToast = ({ message }) => {
            if (!message) return null;
            return (
                <div className="absolute bottom-4 left-4 right-4 z-50 pointer-events-none"
                     style={{ animation: 'slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1)' }}>
                    <div className="flex items-start gap-3 px-5 py-4 rounded-xl shadow-xl border border-red-100 max-w-lg"
                         style={{ backgroundColor: '#FEF2F2' }}>
                        <IconAlert className="w-6 h-6 text-red-500 shrink-0 mt-0.5" />
                        <p className="text-red-700 font-body text-lg font-medium leading-snug">{message}</p>
                    </div>
                </div>
            );
        };

        // ============================================================
        // SUCCESS MODAL
        // ============================================================
        const SuccessModal = ({ data, onDone }) => {
            if (!data) return null;
            return (
                <div className="absolute inset-0 z-50 flex items-center justify-center"
                     style={{ backgroundColor: 'rgba(0,0,0,0.45)', backdropFilter: 'blur(8px)',
                              WebkitBackdropFilter: 'blur(8px)', animation: 'fadeIn 0.2s ease-out' }}>
                    <div className="bg-white rounded-3xl shadow-2xl w-full mx-6 overflow-hidden"
                         style={{ animation: 'scaleUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275)', maxWidth: '36.4rem' }}>
                        <div className="p-10 text-center" style={{ backgroundColor: TEAL }}>
                            <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl"
                                 style={{ animation: 'pulseGlow 2s ease-in-out infinite' }}>
                                <IconCheck className="w-16 h-16" style={{ color: TEAL }} />
                            </div>
                            <h2 className="text-white font-display text-4xl font-extrabold mb-3">Checkout Complete!</h2>
                            <p className="text-white/80 font-body text-xl mb-10 leading-relaxed">
                                <span className="font-bold text-white text-3xl">{data.count}</span> container{data.count > 1 ? 's' : ''} checked out to<br/>
                                <span className="font-bold text-white text-2xl border-b-2 border-white/30 pb-0.5">{data.user}</span>
                            </p>
                            <button onClick={onDone}
                                    className="w-full py-5 rounded-xl font-display font-bold text-xl uppercase tracking-wider shadow-lg bg-white hover:bg-gray-50 transition-colors"
                                    style={{ color: TEAL }}>
                                Done
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // DOWNLOAD MODAL
        // ============================================================
        const DownloadModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="absolute inset-0 z-50 flex items-center justify-center"
                     style={{ backgroundColor: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(8px)',
                              WebkitBackdropFilter: 'blur(8px)', animation: 'fadeIn 0.2s ease-out' }}
                     onClick={onClose}>
                    <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full mx-6 overflow-hidden"
                         style={{ animation: 'scaleUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275)' }}
                         onClick={e => e.stopPropagation()}>
                        <div className="p-6 pb-2 flex items-start justify-between">
                            <div className="flex items-center gap-3">
                                <IconQR style={{ width: 36, height: 36, color: TEAL, flexShrink: 0 }} />
                                <h2 className="font-display text-xl font-extrabold" style={{ color: TEAL }}>
                                    Download the USEFULL app &amp; sign up to get your QR code!
                                </h2>
                            </div>
                            <button onClick={onClose} className="p-2 rounded-lg hover:bg-gray-100 transition-colors shrink-0 ml-2">
                                <IconX className="w-5 h-5 text-gray-400" />
                            </button>
                        </div>
                        <div className="p-6 pt-4 flex gap-6 justify-center">
                            <div className="flex flex-col items-center gap-3">
                                <div className="w-40 h-40 bg-gray-50 rounded-2xl border-2 border-gray-100 flex items-center justify-center">
                                    <svg viewBox="0 0 120 120" className="w-32 h-32">
                                        <rect x="10" y="10" width="30" height="30" rx="4" fill="#222"/><rect x="80" y="10" width="30" height="30" rx="4" fill="#222"/><rect x="10" y="80" width="30" height="30" rx="4" fill="#222"/>
                                        <rect x="15" y="15" width="20" height="20" rx="2" fill="none" stroke="#fff" strokeWidth="4"/><rect x="85" y="15" width="20" height="20" rx="2" fill="none" stroke="#fff" strokeWidth="4"/><rect x="15" y="85" width="20" height="20" rx="2" fill="none" stroke="#fff" strokeWidth="4"/>
                                        <rect x="22" y="22" width="6" height="6" fill="#222"/><rect x="92" y="22" width="6" height="6" fill="#222"/><rect x="22" y="92" width="6" height="6" fill="#222"/>
                                        <rect x="50" y="10" width="6" height="6" fill="#222"/><rect x="58" y="10" width="6" height="6" fill="#222"/><rect x="50" y="18" width="6" height="6" fill="#222"/><rect x="66" y="18" width="6" height="6" fill="#222"/><rect x="50" y="26" width="6" height="6" fill="#222"/><rect x="58" y="26" width="6" height="6" fill="#222"/><rect x="66" y="26" width="6" height="6" fill="#222"/>
                                        <rect x="50" y="50" width="6" height="6" fill="#222"/><rect x="58" y="50" width="6" height="6" fill="#222"/><rect x="10" y="50" width="6" height="6" fill="#222"/><rect x="26" y="50" width="6" height="6" fill="#222"/><rect x="34" y="50" width="6" height="6" fill="#222"/>
                                        <rect x="10" y="58" width="6" height="6" fill="#222"/><rect x="18" y="58" width="6" height="6" fill="#222"/><rect x="34" y="58" width="6" height="6" fill="#222"/><rect x="50" y="58" width="6" height="6" fill="#222"/><rect x="66" y="58" width="6" height="6" fill="#222"/>
                                        <rect x="10" y="66" width="6" height="6" fill="#222"/><rect x="26" y="66" width="6" height="6" fill="#222"/><rect x="50" y="66" width="6" height="6" fill="#222"/><rect x="58" y="66" width="6" height="6" fill="#222"/>
                                        <rect x="80" y="50" width="6" height="6" fill="#222"/><rect x="96" y="50" width="6" height="6" fill="#222"/><rect x="104" y="50" width="6" height="6" fill="#222"/><rect x="80" y="58" width="6" height="6" fill="#222"/><rect x="88" y="58" width="6" height="6" fill="#222"/><rect x="104" y="58" width="6" height="6" fill="#222"/><rect x="80" y="66" width="6" height="6" fill="#222"/><rect x="96" y="66" width="6" height="6" fill="#222"/>
                                        <rect x="80" y="80" width="6" height="6" fill="#222"/><rect x="88" y="80" width="6" height="6" fill="#222"/><rect x="96" y="80" width="6" height="6" fill="#222"/><rect x="80" y="88" width="6" height="6" fill="#222"/><rect x="104" y="88" width="6" height="6" fill="#222"/><rect x="88" y="96" width="6" height="6" fill="#222"/><rect x="96" y="96" width="6" height="6" fill="#222"/><rect x="104" y="104" width="6" height="6" fill="#222"/>

                                    </svg>
                                </div>
                                <div className="flex items-center gap-2">
                                    <svg viewBox="0 0 24 24" className="w-5 h-5 text-gray-700" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                                    <span className="font-display font-bold text-sm text-gray-700">iOS</span>
                                </div>
                            </div>
                            <div className="w-px bg-gray-200 self-stretch" />
                            <div className="flex flex-col items-center gap-3">
                                <div className="w-40 h-40 bg-gray-50 rounded-2xl border-2 border-gray-100 flex items-center justify-center">
                                    <svg viewBox="0 0 120 120" className="w-32 h-32">
                                        <rect x="10" y="10" width="30" height="30" rx="4" fill="#222"/><rect x="80" y="10" width="30" height="30" rx="4" fill="#222"/><rect x="10" y="80" width="30" height="30" rx="4" fill="#222"/>
                                        <rect x="15" y="15" width="20" height="20" rx="2" fill="none" stroke="#fff" strokeWidth="4"/><rect x="85" y="15" width="20" height="20" rx="2" fill="none" stroke="#fff" strokeWidth="4"/><rect x="15" y="85" width="20" height="20" rx="2" fill="none" stroke="#fff" strokeWidth="4"/>
                                        <rect x="22" y="22" width="6" height="6" fill="#222"/><rect x="92" y="22" width="6" height="6" fill="#222"/><rect x="22" y="92" width="6" height="6" fill="#222"/>
                                        <rect x="50" y="10" width="6" height="6" fill="#222"/><rect x="66" y="10" width="6" height="6" fill="#222"/><rect x="58" y="18" width="6" height="6" fill="#222"/><rect x="50" y="26" width="6" height="6" fill="#222"/><rect x="66" y="26" width="6" height="6" fill="#222"/><rect x="58" y="34" width="6" height="6" fill="#222"/>
                                        <rect x="10" y="50" width="6" height="6" fill="#222"/><rect x="18" y="50" width="6" height="6" fill="#222"/><rect x="34" y="50" width="6" height="6" fill="#222"/><rect x="50" y="50" width="6" height="6" fill="#222"/><rect x="66" y="50" width="6" height="6" fill="#222"/>
                                        <rect x="10" y="58" width="6" height="6" fill="#222"/><rect x="26" y="58" width="6" height="6" fill="#222"/><rect x="42" y="58" width="6" height="6" fill="#222"/><rect x="58" y="58" width="6" height="6" fill="#222"/>
                                        <rect x="10" y="66" width="6" height="6" fill="#222"/><rect x="18" y="66" width="6" height="6" fill="#222"/><rect x="34" y="66" width="6" height="6" fill="#222"/><rect x="50" y="66" width="6" height="6" fill="#222"/><rect x="66" y="66" width="6" height="6" fill="#222"/>
                                        <rect x="80" y="50" width="6" height="6" fill="#222"/><rect x="88" y="50" width="6" height="6" fill="#222"/><rect x="104" y="50" width="6" height="6" fill="#222"/><rect x="80" y="58" width="6" height="6" fill="#222"/><rect x="96" y="58" width="6" height="6" fill="#222"/><rect x="104" y="66" width="6" height="6" fill="#222"/>
                                        <rect x="80" y="80" width="6" height="6" fill="#222"/><rect x="96" y="80" width="6" height="6" fill="#222"/><rect x="104" y="80" width="6" height="6" fill="#222"/><rect x="88" y="88" width="6" height="6" fill="#222"/><rect x="80" y="96" width="6" height="6" fill="#222"/><rect x="96" y="96" width="6" height="6" fill="#222"/><rect x="104" y="96" width="6" height="6" fill="#222"/><rect x="80" y="104" width="6" height="6" fill="#222"/><rect x="88" y="104" width="6" height="6" fill="#222"/>
                                        <rect x="50" y="80" width="6" height="6" fill="#222"/><rect x="66" y="80" width="6" height="6" fill="#222"/><rect x="58" y="88" width="6" height="6" fill="#222"/><rect x="66" y="88" width="6" height="6" fill="#222"/><rect x="50" y="96" width="6" height="6" fill="#222"/><rect x="58" y="96" width="6" height="6" fill="#222"/><rect x="50" y="104" width="6" height="6" fill="#222"/><rect x="66" y="104" width="6" height="6" fill="#222"/>
                                    </svg>
                                </div>
                                <div className="flex items-center gap-2">
                                    <svg viewBox="0 0 24 24" className="w-5 h-5 text-gray-700" fill="currentColor"><path d="M17.523 2.237a.625.625 0 0 0-.803.368l-.89 2.39a7.987 7.987 0 0 0-7.665 0l-.89-2.39a.625.625 0 1 0-1.17.436l.86 2.304A8.004 8.004 0 0 0 3 12v.5h18V12a8.004 8.004 0 0 0-3.965-6.655l.86-2.304a.625.625 0 0 0-.372-.804zM8.5 10a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm7 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2zM3 13.5h18V19a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-5.5z"/></svg>
                                    <span className="font-display font-bold text-sm text-gray-700">Android</span>
                                </div>
                            </div>
                        </div>
                        <div className="px-6 pb-6 pt-2 text-center">
                            <p className="font-body text-xs text-gray-400">Scan the QR code with your phone's camera to download</p>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // CANCEL + TIMEOUT BUTTON (shared)
        // ============================================================
        const CancelButton = ({ timeLeft, onCancel }) => (
            <button
                onClick={onCancel}
                className="flex items-center gap-2 rounded-xl transition-all"
                style={{
                    padding: '9px 16px',
                    border: `1.5px solid ${timeLeft <= 10 ? '#fca5a5' : '#e5e7eb'}`,
                    backgroundColor: timeLeft <= 10 ? '#FEF2F2' : 'white',
                    cursor: 'pointer',
                    transition: 'border-color 0.3s, background-color 0.3s',
                }}
            >
                <svg viewBox="0 0 24 24" fill="none" stroke={timeLeft <= 10 ? '#ef4444' : '#9ca3af'}
                     strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                     style={{ width: 18, height: 18 }}>
                    <circle cx="12" cy="12" r="10"/><path d="M12 6v6l3 3"/>
                </svg>
                <span className="font-display font-bold tabular-nums"
                      style={{ fontSize: '1rem', color: timeLeft <= 10 ? '#ef4444' : '#6b7280' }}>
                    {timeLeft}s
                </span>
                <div style={{ width: 1, height: 16, backgroundColor: timeLeft <= 10 ? '#fca5a5' : '#e2e8f0', margin: '0 2px' }} />
                <span className="font-display font-bold uppercase tracking-wider"
                      style={{ fontSize: '1rem', color: timeLeft <= 10 ? '#ef4444' : '#9ca3af' }}>
                    Cancel
                </span>
            </button>
        );

        // ============================================================
        // DOWNLOAD BUTTON (shared)
        // ============================================================
        const DownloadButton = ({ onClick }) => (
            <button
                onClick={onClick}
                className="flex items-center gap-3 px-5 py-3 rounded-xl bg-white border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors"
            >
                <IconQR style={{ width: 24, height: 24, color: TEAL, flexShrink: 0 }} />
                <span className="font-body font-medium text-gray-600" style={{ fontSize: '1.03rem' }}>
                    Get your USEFULL QR code
                </span>
            </button>
        );

        // ============================================================
        // MAIN APP
        // ============================================================
        const App = () => {
            const [items, setItems]                         = useState([]);
            const [status, setStatus]                       = useState('idle');
            const [error, setError]                         = useState(null);
            const [timeLeft, setTimeLeft]                   = useState(30);
            const [successData, setSuccessData]             = useState(null);
            const [justScanned, setJustScanned]             = useState(false);
            const [showDownloadModal, setShowDownloadModal] = useState(false);
            const [isPortrait, setIsPortrait]               = useState(() => window.innerHeight > window.innerWidth);

            const scannedCodesRef = useRef(new Set());
            const audioCtxRef     = useRef(null);
            const dingBufferRef   = useRef(null);

            // Orientation detection
            useEffect(() => {
                const mq = window.matchMedia('(orientation: portrait)');
                const handler = (e) => setIsPortrait(e.matches);
                mq.addEventListener('change', handler);
                return () => mq.removeEventListener('change', handler);
            }, []);

            // Audio unlock
            useEffect(() => {
                const unlock = async () => {
                    if (audioCtxRef.current) return;
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxRef.current = ctx;
                    try {
                        const res = await fetch('../success-ding.m4a');
                        const buf = await res.arrayBuffer();
                        dingBufferRef.current = await ctx.decodeAudioData(buf);
                    } catch (_) {}
                };
                document.addEventListener('touchstart', unlock, { once: true });
                document.addEventListener('click',      unlock, { once: true });
                return () => {
                    document.removeEventListener('touchstart', unlock);
                    document.removeEventListener('click',      unlock);
                };
            }, []);

            const playDing = useCallback(() => {
                if (!audioCtxRef.current || !dingBufferRef.current) return;
                const src = audioCtxRef.current.createBufferSource();
                src.buffer = dingBufferRef.current;
                src.connect(audioCtxRef.current.destination);
                src.start(0);
            }, []);

            const hasItems    = items.length > 0;
            const showTimeout = hasItems && status !== 'success';

            // Countdown timer
            useEffect(() => {
                if (!showTimeout) { setTimeLeft(30); return; }
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) { handleCancel(); return 30; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [showTimeout]);

            const handleCancel = useCallback(() => {
                setItems([]); setStatus('idle'); setError(null);
                setSuccessData(null); setTimeLeft(30); setJustScanned(false);
                scannedCodesRef.current.clear();
            }, []);

            const handleScanContainer = useCallback(() => {
                playDing();
                setTimeLeft(30);
                setItems(prev => [...prev, { id: Date.now() }]);
                setStatus('scanning');
                setError(null);
                setJustScanned(true);
                setTimeout(() => setJustScanned(false), 1500);
            }, [playDing]);

            const handleScanUser = useCallback(() => {
                if (items.length === 0) {
                    setError("Please scan a USEFULL container first.");
                    setTimeout(() => setError(null), 3000);
                    return;
                }
                playDing();
                setSuccessData({ user: "Owen", count: items.length });
                setStatus('success');
                setTimeout(() => handleCancel(), 4000);
            }, [items.length, handleCancel, playDing]);

            const handleQRResult = useCallback((decoded) => {
                if (scannedCodesRef.current.has(decoded)) return;
                scannedCodesRef.current.add(decoded);
                if (decoded.startsWith('cup')) {
                    handleScanContainer();
                } else if (decoded.startsWith('user')) {
                    handleScanUser();
                } else {
                    setError('Unrecognized QR code');
                    setTimeout(() => setError(null), 4000);
                }
            }, [handleScanContainer, handleScanUser]);

            const modals = (
                <>
                    <DownloadModal isOpen={showDownloadModal} onClose={() => setShowDownloadModal(false)} />
                    <SuccessModal data={status === 'success' ? successData : null} onDone={handleCancel} />
                </>
            );

            // ── PORTRAIT LAYOUT ──────────────────────────────────────
            if (isPortrait) {
                return (
                    <div className="h-full w-full flex flex-col overflow-hidden select-none relative"
                         style={{ backgroundColor: '#EEF2F3' }}>

                        {/* Camera — top 47% */}
                        <div className="relative shrink-0" style={{ flex: '0 0 47%' }}>
                            <CameraBox isScanning={status !== 'success'} onQRResult={handleQRResult} isPortrait />
                            <ErrorToast message={error} />
                        </div>

                        <div className="camera-content-divider shrink-0" />

                        {/* Content — bottom section */}
                        <div className="flex-1 flex flex-col overflow-hidden"
                             style={{ padding: '12px 14px 10px 16px', minHeight: 0, gap: 10 }}>

                            {/* Two-column main area */}
                            <div className="flex-1 flex gap-3 overflow-hidden" style={{ minHeight: 0 }}>

                                {/* Left: instructions */}
                                <div className="flex-1 flex flex-col justify-center gap-3 overflow-hidden" style={{ minWidth: 0 }}>
                                    <div>
                                        <h2 className="font-display font-extrabold leading-tight"
                                            style={{ color: TEAL, fontSize: '2.6rem' }}>
                                            {hasItems ? 'Scan more containers' : 'Scan your containers'}
                                        </h2>
                                        <p className="font-body text-gray-500 mt-2 leading-snug"
                                           style={{ fontSize: '1.15rem' }}>
                                            {hasItems
                                                ? 'Or scan your QR code to finish checkout'
                                                : 'Hold each container in front of the camera'}
                                        </p>
                                    </div>
                                </div>

                                {/* Right: count card */}
                                {hasItems && status !== 'success' && (
                                    <div className="shrink-0" style={{ width: '44%', alignSelf: 'center', paddingTop: 8, paddingBottom: 8 }}>
                                        <CountCard count={items.length} justScanned={justScanned} />
                                    </div>
                                )}
                            </div>

                            {/* Bottom strip: logo + action */}
                            <div className="shrink-0 flex items-center gap-3"
                                 style={{ borderTop: '1px solid rgba(0,140,149,0.12)', paddingTop: 9 }}>
                                <div className="flex flex-col items-start">
                                    <UsefullLogo style={{ height: '2rem' }} className="w-auto" />
                                    <p className="font-display font-bold uppercase tracking-[0.2em]"
                                       style={{ color: TEAL, fontSize: '0.6rem', marginTop: 2 }}>
                                        Checkout Station
                                    </p>
                                </div>

                                <div className="ml-auto">
                                    {hasItems && status !== 'success'
                                        ? <CancelButton timeLeft={timeLeft} onCancel={handleCancel} />
                                        : <DownloadButton onClick={() => setShowDownloadModal(true)} />
                                    }
                                </div>
                            </div>
                        </div>

                        {modals}
                    </div>
                );
            }

            // ── LANDSCAPE LAYOUT ─────────────────────────────────────
            return (
                <div className="h-full w-full flex overflow-hidden select-none relative"
                     style={{ backgroundColor: '#EEF2F3', padding: '20px', gap: '20px' }}>

                    {/* Left: Camera — full height, 50% width */}
                    <div className="relative shrink-0" style={{ height: '100%', width: '50%', maxWidth: '50%' }}>
                        <CameraBox isScanning={status !== 'success'} onQRResult={handleQRResult} isPortrait={false} />
                        <ErrorToast message={error} />
                    </div>

                    {/* Right: three-zone column */}
                    <div className="flex-1 flex flex-col min-w-0 px-4 pt-2 pb-5">

                        {/* Logo — top */}
                        <div className="flex flex-col items-center pb-0">
                            <UsefullLogo style={{ height: '4.68rem' }} className="w-auto" />
                            {!hasItems && (
                                <p className="font-display font-bold uppercase tracking-[0.22em] mt-1"
                                   style={{ color: TEAL, fontSize: '1.17rem' }}>
                                    Checkout Station
                                </p>
                            )}
                        </div>

                        {/* Center: instruction + counter */}
                        <div className="flex-1 flex flex-col items-center justify-center gap-6 overflow-hidden">
                            <div className="text-center">
                                <h2 className="font-display font-extrabold leading-tight"
                                    style={{ fontSize: '2.81rem', color: TEAL }}>
                                    {hasItems ? 'Scan more containers' : 'Scan your containers'}
                                </h2>
                                <p className="font-body text-gray-500 mt-3 leading-relaxed"
                                   style={{ fontSize: '1.4rem' }}>
                                    {hasItems
                                        ? 'Or scan your QR code to finish'
                                        : 'Hold each container in front of the camera'}
                                </p>
                            </div>

                            {hasItems && status !== 'success' && (
                                <CountCard count={items.length} justScanned={justScanned} />
                            )}
                        </div>

                        {/* Bottom: cancel or download */}
                        <div className="flex items-center justify-center gap-3 pt-2">
                            {hasItems && status !== 'success'
                                ? <CancelButton timeLeft={timeLeft} onCancel={handleCancel} />
                                : <DownloadButton onClick={() => setShowDownloadModal(true)} />
                            }
                        </div>
                    </div>

                    {modals}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
